services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clineval
      POSTGRES_PASSWORD: clineval_secret
      POSTGRES_DB: clineval
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clineval"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://clineval:clineval_secret@db:5432/clineval
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ./data:/app/data:ro
      - ./model_predictions:/app/model_predictions:ro
      - ./heatmaps:/app/heatmaps:ro
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
